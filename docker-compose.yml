version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scraper-db
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scraperdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
